<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube 3 Video Player</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f0f;
    color: #e8e8e8;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    color: #fff;
  }

  header h1 span {
    color: #ff4444;
  }

  header p {
    margin-top: 6px;
    font-size: 0.875rem;
    color: #888;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
    max-width: 1280px;
    margin: 0 auto;
  }

  .card {
    background: #1a1a1a;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .num {
    background: #ff4444;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-header span {
    font-size: 13px;
    font-weight: 500;
    color: #ccc;
  }

  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
  }

  .input-row input {
    flex: 1;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e8e8e8;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input::placeholder { color: #555; }
  .input-row input:focus { border-color: #ff4444; }

  .input-row button {
    background: #ff4444;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .input-row button:hover { background: #e03030; }
  .input-row button:active { transform: scale(0.97); }

  .player-wrap {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    margin: 0 16px 16px;
    border-radius: 8px;
    overflow: hidden;
  }

  .player-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #444;
    background: #111;
    border-radius: 8px;
  }

  .placeholder svg {
    width: 44px;
    height: 44px;
    opacity: 0.5;
  }

  .placeholder p {
    font-size: 12px;
    color: #555;
    text-align: center;
    padding: 0 1rem;
    line-height: 1.5;
  }

  .error-msg {
    font-size: 12px;
    color: #ff6b6b;
    padding: 0 16px 10px;
    display: none;
  }

  footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: #444;
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    body { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>▶ YouTube <span>3</span> Player</h1>
  <p>তিনটা লিংক দাও, তিনটা ভিডিও একসাথে দেখো</p>
</header>

<div class="grid">
  <div class="card" id="card-1">
    <div class="card-header">
      <div class="num">1</div>
      <span>প্রথম ভিডিও</span>
    </div>
    <div class="input-row">
      <input type="text" id="url-1" placeholder="YouTube লিংক বা Video ID..." />
      <button onclick="loadVideo(1)">চালাও</button>
    </div>
    <div class="error-msg" id="err-1">সঠিক YouTube লিংক দাও।</div>
    <div class="player-wrap">
      <div class="placeholder" id="ph-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
        <p>লিংক দিয়ে চালাও</p>
      </div>
      <iframe id="frame-1" src="" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
    </div>
  </div>

  <div class="card" id="card-2">
    <div class="card-header">
      <div class="num">2</div>
      <span>দ্বিতীয় ভিডিও</span>
    </div>
    <div class="input-row">
      <input type="text" id="url-2" placeholder="YouTube লিংক বা Video ID..." />
      <button onclick="loadVideo(2)">চালাও</button>
    </div>
    <div class="error-msg" id="err-2">সঠিক YouTube লিংক দাও।</div>
    <div class="player-wrap">
      <div class="placeholder" id="ph-2">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
        <p>লিংক দিয়ে চালাও</p>
      </div>
      <iframe id="frame-2" src="" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
    </div>
  </div>

  <div class="card" id="card-3">
    <div class="card-header">
      <div class="num">3</div>
      <span>তৃতীয় ভিডিও</span>
    </div>
    <div class="input-row">
      <input type="text" id="url-3" placeholder="YouTube লিংক বা Video ID..." />
      <button onclick="loadVideo(3)">চালাও</button>
    </div>
    <div class="error-msg" id="err-3">সঠিক YouTube লিংক দাও।</div>
    <div class="player-wrap">
      <div class="placeholder" id="ph-3">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/>
        </svg>
        <p>লিংক দিয়ে চালাও</p>
      </div>
      <iframe id="frame-3" src="" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
    </div>
  </div>
</div>

<footer>YouTube iframe Embed — কোনো API key লাগে না</footer>

<script>
function extractId(input) {
  input = input.trim();
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/,
    /^([A-Za-z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return null;
}

function loadVideo(n) {
  const input = document.getElementById('url-' + n).value;
  const errEl = document.getElementById('err-' + n);
  const frame = document.getElementById('frame-' + n);
  const ph = document.getElementById('ph-' + n);
  const id = extractId(input);

  if (!id) {
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  frame.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
  frame.style.display = 'block';
  ph.style.display = 'none';
}

[1, 2, 3].forEach(n => {
  document.getElementById('url-' + n).addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadVideo(n);
  });
});
</script>

</body>
</html>
